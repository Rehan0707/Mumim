version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg15
    container_name: munim-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: munim
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
