name: Keep Backend Alive

on:
  schedule:
    # Runs every 10 minutes (Render sleeps after 15 minutes of inactivity)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows manual triggering if needed

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Health Endpoint
        run: curl -sL -w "%{http_code}\\n" -o /dev/null https://mumim.onrender.com/health
